name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklar
        run: pip install pyinstaller pillow openpyxl requests requests-ntlm requests-negotiate-sspi

      - name: Yer tutucu icon olustur (icon.png yoksa)
        run: |
          python -c "
          import os
          if not os.path.exists('icon.png'):
              from PIL import Image, ImageDraw
              img = Image.new('RGBA', (256,256), (26,82,118,255))
              d = ImageDraw.Draw(img)
              d.rectangle([30,80,226,176], fill=(255,255,255,200))
              img.save('icon.png')
          "

      - name: icon.ico olustur
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon.png').convert('RGBA')
          img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: PyInstaller ile .exe derle
        run: |
          pyinstaller --onefile --windowed --icon=icon.ico --name=PoliportArsiv --add-data "icon.png;." poliport_arsiv.py

      - name: NSIS kurulumu
        run: choco install nsis -y --no-progress

      - name: NSIS ile Setup.exe olustur
        shell: powershell
        run: |
          Copy-Item dist\PoliportArsiv.exe PoliportArsiv.exe
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = (Get-ChildItem "C:\Program Files*\NSIS\makensis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          Write-Host "makensis yolu: $makensis"
          & $makensis installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Mevcut release sil (varsa)
        shell: powershell
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.GITHUB_TOKEN }}"
            Accept = "application/vnd.github.v3+json"
          }
          $repo = "${{ github.repository }}"
          $tag  = "${{ github.ref_name }}"
          try {
            $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers -ErrorAction Stop
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($rel.id)" -Method Delete -Headers $headers
            Write-Host "Eski release silindi"
          } catch { Write-Host "Silinecek release yok" }

      - name: Release olustur ve Setup.exe yukle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Poliport Kontrol Formu Arşivi ${{ github.ref_name }}"
          body: |
            ## ⬇️ İndir

            **`PoliportArsiv_Setup_v1.0.exe`** dosyasını indir ve çalıştır.

            Kurulum sihirbazı:
            - Programı Program Files'a kurar
            - Masaüstüne kısayol oluşturur
            - Başlat menüsüne ekler
            - Kaldırma (uninstall) desteği

            ### Gereksinimler
            - Windows 10 / 11
            - Poliport sunucusuna erişim (domain ağı)

            ---
            *S. SEYMEN tarafından hazırlanmıştır*
          files: PoliportArsiv_Setup_v1.0.exe
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
